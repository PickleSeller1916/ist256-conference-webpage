<!DOCTYPE html>
<html>
<head>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body class='p-3'>
  <form id='f'>            <!--form inputs -->
      <input type='text' id='name' class='form-control' placeholder='Name' required>

      <input type='email' id='email' class='form-control' placeholder='Email' required>

      <input type='text' id='age' class='form-control' placeholder='Age' required>

      <input type='text' id='org' class='form-control' placeholder='Organization or Address' required>
      
      <input type='text' id='phone' class='form-control' placeholder='Phone # (optional)'>
      
      <button type="button" class="btn btn-success">Save and submit form</button>
    
  </form>
  <script src="script.js"></script>
</body>
</html>
