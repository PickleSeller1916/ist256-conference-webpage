<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Forms</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
</head>
<body class="site-page">
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top site-navbar">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">XYZ Conference</a>
      <div class="d-flex flex-wrap gap-2 py-2">
        <a class="btn btn-outline-secondary btn-sm" href="forms.html">Forms</a>
        <a class="btn btn-outline-secondary btn-sm" href="catalog.html">Catalog</a>
        <a class="btn btn-outline-secondary btn-sm" href="cart.html">Cart</a>
        <a class="btn btn-outline-secondary btn-sm" href="checkout.html">Checkout</a>
        <a class="btn btn-outline-secondary btn-sm" href="order-history.html">Order History</a>
        <a class="btn btn-outline-secondary btn-sm" href="approval.html">Approval</a>
      </div>
    </div>
  </nav>

  <main class="container site-main">
    <section class="card border-0 shadow-sm p-4">
      <h1 class="h4 mb-4">Member Registration Form</h1>
      <form id='f'>
        <div class="mb-3">
          <label for="name" class="form-label">Name <span class="required-asterisk">*</span></label>
          <input type='text' id='name' class='form-control' placeholder='Name'>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email <span class="required-asterisk">*</span></label>
          <input type='email' id='email' class='form-control' placeholder='Email'>
        </div>

        <div class="mb-3">
          <label for="age" class="form-label">Age <span class="required-asterisk">*</span></label>
          <input type='text' id='age' class='form-control' placeholder='Age'>
        </div>

        <div class="mb-3">
          <label for="org" class="form-label">Organization or Address <span class="required-asterisk">*</span></label>
          <input type='text' id='org' class='form-control' placeholder='Organization or Address'>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">Phone #</label>
          <input type='text' id='phone' class='form-control' placeholder='Phone # (optional)'>
        </div>

        <div class="d-flex flex-wrap gap-2">
          <button type="button" class="btn btn-success">Save and submit form</button>
          <a class="btn btn-primary" href="catalog.html">Next: Catalog</a>
        </div>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
