<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ Conference -- Catalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top site-navbar">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="index.html">XYZ Conference</a>
            <div class="d-flex flex-wrap gap-2 py-2">
                <a class="btn btn-outline-secondary btn-sm" href="forms.html">Forms</a>
                <a class="btn btn-outline-secondary btn-sm" href="catalog.html">Catalog</a>
                <a class="btn btn-outline-secondary btn-sm" href="cart.html">Cart</a>
                <a class="btn btn-outline-secondary btn-sm" href="checkout.html">Checkout</a>
                <a class="btn btn-outline-secondary btn-sm" href="order-history.html">Order History</a>
                <a class="btn btn-outline-secondary btn-sm" href="approval.html">Approval</a>
            </div>
        </div>
    </nav>

    <main class="container mb-5 site-main">
        <div class="row">
            <div class="col-lg-8">
                <section class="p-4 border rounded bg-white shadow-sm mb-4">
                    <h3>Add or Update Conference Product</h3>
                    <hr>
                    <form id="productForm" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="productId" class="form-label">Product ID <span class="required-asterisk">*</span></label>
                                <input type="text" id="productId" class="form-control" placeholder="CONF-500">
                            </div>
                            <div class="col-md-6">
                                <label for="productTitle" class="form-label">Product Title <span class="required-asterisk">*</span></label>
                                <input type="text" id="productTitle" class="form-control" placeholder="Conference Workshop Pass">
                            </div>
                            <div class="col-md-6">
                                <label for="productCategory" class="form-label">Category <span class="required-asterisk">*</span></label>
                                <input type="text" id="productCategory" class="form-control" placeholder="Workshop">
                            </div>
                            <div class="col-md-6">
                                <label for="productDuration" class="form-label">Duration <span class="required-asterisk">*</span></label>
                                <input type="text" id="productDuration" class="form-control" placeholder="90 Minutes">
                            </div>
                            <div class="col-md-6">
                                <label for="productPrice" class="form-label">Price <span class="required-asterisk">*</span></label>
                                <input type="number" id="productPrice" class="form-control" min="0" step="0.01" placeholder="79.00">
                            </div>
                            <div class="col-md-6">
                                <label for="productSpeaker" class="form-label">Speaker or Host</label>
                                <input type="text" id="productSpeaker" class="form-control" placeholder="Jamie Rivera">
                            </div>
                            <div class="col-12">
                                <label for="productDescription" class="form-label">Description <span class="required-asterisk">*</span></label>
                                <textarea id="productDescription" class="form-control" rows="3" placeholder="Describe the session, material, or event experience."></textarea>
                            </div>
                            <div class="col-12 d-flex flex-wrap gap-2">
                                <button type="submit" class="btn btn-success">Save Product</button>
                                <button type="button" id="resetProductForm" class="btn btn-outline-secondary">Clear Form</button>
                            </div>
                        </div>
                    </form>
                </section>

                <section class="p-4 border rounded bg-white shadow-sm">
                    <h3>Event Catalog</h3>
                    <hr>
                    <div class="mb-4">
                        <input type="text" id="searchInput" class="form-control" placeholder="Search sessions, speakers, or materials...">
                    </div>

                    <div id="productDisplay" class="row g-3">
                        </div>
                </section>
            </div>

            <div class="col-lg-4">
                <aside class="p-4 border rounded bg-white shadow-sm">
                    <h4>Shopping Cart</h4>
                    <hr>
                    <div id="cartItemsContainer" class="mb-3">
                        <p class="text-muted small">No items added yet.</p>
                    </div>
                    
                    <div class="pt-3 border-top d-grid gap-2">
                        <a href="checkout.html" class="button">Check Out</a>
                        <a href="order-history.html" class="btn btn-outline-primary">Order History</a>
                        <a href="approval.html" class="btn btn-outline-dark">Approval Dashboard</a>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
