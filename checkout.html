<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Finalization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.6;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9f9;
        }

        .checkout-card {
            background: #fff;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .item-list {
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 1.2em;
            margin-top: 15px;
        }

        .confirm-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
        }

        .confirm-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="checkout-card">
        <h1>Confirm Your Sessions</h1>
        <p>Please review the items in your cart before finishing.</p>

        <ul class="item-list" id="cart-items">
            <li class="item">
                <span>Session Name</span>
                <span>$0.00</span>
            </li>
            </ul>

        <div class="total-row">
            <span>Total:</span>
            <span id="order-total">$0.00</span>
        </div>

        <button type="button" class="confirm-btn" id="submit-order">
            Complete Purchase
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
