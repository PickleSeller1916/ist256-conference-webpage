<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Session Catalog</h2>

    <form class="row g-3 mt-3">

        <div class="col-md-6">
            <label class="form-label">Session ID</label>
            <input type="text" class="form-control" value="Auto-generated" disabled>
        </div>

        <div class="col-md-6">
            <label class="form-label">Session Title</label>
            <input id="title" type="text" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Workshop</label>
            <input id="category" type="text" class="form-control" required>
        </div>

        <div class="col-md-3">
            <label class="form-label">Duration</label>
            <input id="duration" type="text" class="form-control" required>
        </div>

        <div class="col-md-3">
            <label class="form-label">Registration Fee</label>
            <input id="price" type="number" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Speaker</label>
            <input id="speaker" type="text" class="form-control">
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Submit</button>
        </div>

    </form>

    <hr>

    <input id="search" type="text" class="form-control mb-3" placeholder="Search sessions...">

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Workshop</th>
                <th>Duration</th>
                <th>Fee</th>
                <th>Speaker</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            
        </tbody>
    </table>

</div>



<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>

</body>
</html>
