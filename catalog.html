<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="site-page">
<nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top site-navbar">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="index.html">XYZ Conference</a>
        <div class="d-flex flex-wrap gap-2 py-2">
            <a class="btn btn-outline-secondary btn-sm" href="forms.html">Forms</a>
            <a class="btn btn-outline-secondary btn-sm" href="catalog.html">Catalog</a>
            <a class="btn btn-outline-secondary btn-sm" href="cart.html">Cart</a>
            <a class="btn btn-outline-secondary btn-sm" href="checkout.html">Checkout</a>
            <a class="btn btn-outline-secondary btn-sm" href="order-history.html">Order History</a>
            <a class="btn btn-outline-secondary btn-sm" href="approval.html">Approval</a>
        </div>
    </div>
</nav>

<main class="container site-main">

    <h2>Session Catalog</h2>

    <form class="row g-3 mt-3">

        <div class="col-md-6">
            <label class="form-label">Session ID</label>
            <input type="text" class="form-control" placeholder="Auto-generated" disabled>
        </div>

        <div class="col-md-6">
            <label class="form-label">Session Title <span class="required-asterisk">*</span></label>
            <input id="title" type="text" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Workshop <span class="required-asterisk">*</span></label>
            <input id="category" type="text" class="form-control" required>
        </div>

        <div class="col-md-3">
            <label class="form-label">Duration <span class="required-asterisk">*</span></label>
            <input id="duration" type="text" class="form-control" required>
        </div>

        <div class="col-md-3">
            <label class="form-label">Registration Fee <span class="required-asterisk">*</span></label>
            <input id="price" type="number" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Speaker</label>
            <input id="speaker" type="text" class="form-control">
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Submit</button>
        </div>

    </form>

    <hr>

    <input id="search" type="text" class="form-control mb-3" placeholder="Search sessions...">

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Workshop</th>
                <th>Duration</th>
                <th>Fee</th>
                <th>Speaker</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            
        </tbody>
    </table>

</main>



<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>

</body>
</html>
